<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKRT得物运营</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #EEF2FF;
            --bg: #F1F5F9;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --success: #10B981;
            --success-light: #D1FAE5;
            --danger: #EF4444;
            --danger-light: #FEE2E2;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
       
        * { margin:0; padding:0; box-sizing:border-box; }
       
        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }
       
        .container { max-width: 1440px; margin: 0 auto; }
       
        .nav-tabs { display:flex; gap:6px; margin-bottom:24px; background:var(--card); padding:8px; border-radius:16px; box-shadow:var(--shadow); flex-wrap:wrap; }
       
        .nav-btn { padding:12px 20px; border:none; background:transparent; border-radius:10px; cursor:pointer; font-weight:600; font-size:0.9rem; color:var(--text-light); transition:all 0.3s ease; }
       
        .nav-btn:hover { background:var(--primary-light); color:var(--primary); }
        .nav-btn.active { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(99,102,241,0.3); }
       
        .module-content { display:none; animation:fadeIn 0.3s ease; }
        .module-content.active { display:block; }
       
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
       
        .card { background:var(--card); border-radius:16px; padding:24px; box-shadow:var(--shadow); border:1px solid var(--border); margin-bottom:20px; transition:all 0.3s ease; }
        .card:hover { box-shadow:var(--shadow-lg); }
       
        h2 { margin:0 0 20px 0; color:var(--text); font-size:1.25rem; font-weight:700; display:flex; justify-content:space-between; align-items:center; padding-bottom:16px; border-bottom:2px solid var(--primary-light); }
       
        #scanIn { width:100%; padding:18px 20px; font-size:1.2rem; border:2px solid var(--primary); border-radius:12px; font-weight:600; background:var(--primary-light); }
       
        .file-box { border:2px dashed var(--border); border-radius:12px; padding:32px 24px; text-align:center; cursor:pointer; position:relative; background:var(--card); transition:all 0.3s ease; font-weight:600; color:var(--text-light); }
        .file-box:hover { border-color:var(--primary); background:var(--primary-light); color:var(--primary); transform:translateY(-2px); }
        .file-box input { position:absolute; inset:0; opacity:0; cursor:pointer; }
       
        .status { font-size:0.85rem; color:var(--text-light); margin-top:12px; font-weight:500; }
       
        .res-item { display:flex; align-items:center; gap:20px; padding:20px; border:1px solid var(--border); border-radius:12px; margin-bottom:12px; background:var(--card); transition:all 0.3s ease; }
        .res-item:hover { border-color:var(--primary); box-shadow:var(--shadow); }
       
        .res-img { width:100px; height:100px; border-radius:10px; object-fit:cover; border:2px solid var(--border); transition:all 0.3s ease; }
       
        .pdd-oid { font-family:'SF Mono',Monaco,monospace; font-size:0.85rem; color:var(--text-light); background:var(--bg); padding:6px 12px; border-radius:8px; font-weight:600; }
       
        .dw-input { flex:1; padding:14px 16px; border:2px solid var(--border); border-radius:10px; font-size:1rem; font-weight:500; transition:all 0.3s ease; background:var(--bg); }
        .dw-input:focus { border-color:var(--primary); outline:none; background:var(--primary-light); box-shadow:0 0 0 3px rgba(99,102,241,0.1); }
       
        .recent-box { margin-top:20px; background:var(--bg); padding:16px; border-radius:12px; border:1px solid var(--border); }
       
        .recent-item { font-size:0.85rem; color:var(--text-light); display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--border); }
        .recent-item:last-child { border-bottom:none; }
       
        .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
       
        .stat-item { background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border); text-align:center; transition:all 0.3s ease; }
        .stat-item:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
       
        .stat-value { font-size:1.5rem; font-weight:700; color:var(--primary); margin-bottom:8px; }
       
        table { width:100%; border-collapse:collapse; font-size:0.9rem; }
        th, td { padding:14px 16px; border:1px solid var(--border); text-align:left; }
        th { background:var(--bg); color:var(--text-light); font-weight:600; text-transform:uppercase; font-size:0.8rem; letter-spacing:0.5px; }
        tr:hover td { background:var(--primary-light); }
       
        .btn { padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.9rem; transition:all 0.3s ease; display:inline-flex; align-items:center; gap:6px; }
        .btn:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
        .btn-primary { background:var(--primary); color:white; }
        .btn-primary:hover { background:var(--primary-dark); }
        .btn-success { background:var(--success); color:white; }
        .btn-success:hover { background:#059669; }
        .btn-danger { background:var(--danger); color:white; }
        .btn-danger:hover { background:#DC2626; }
        .btn-outline { background:white; border:1px solid var(--border); color:var(--text-light); font-size:0.8rem; padding:6px 12px; }
       
        .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.75); color:white; padding:12px 25px; border-radius:8px; font-size:16px; z-index:9999; opacity:0; transition:opacity 0.3s ease; pointer-events:none; text-align:center; min-width:150px; }
        .toast.show { opacity:1; }
       
        /* 新增手动录入弹窗 */
        .manual-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .manual-content {
            background: var(--card);
            width: 92%;
            max-width: 620px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 24px;
        }
    </style>
</head>
<body>
<div id="toast"></div>

<!-- 新增：手动录入弹窗 -->
<div id="manualModal" class="manual-modal">
    <div class="manual-content">
        <h2 style="margin-bottom:20px;">📝 手动录入历史记录</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px;">
            <div>
                <label style="display:block; margin-bottom:6px; font-weight:600; color:var(--text-light);">快递单号</label>
                <input id="manualTrack" type="text" placeholder="SF123456789" style="width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:1rem;">
            </div>
            <div>
                <label style="display:block; margin-bottom:6px; font-weight:600; color:var(--text-light);">得物单号</label>
                <input id="manualDw" type="text" placeholder="DW12345678" style="width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:1rem;">
            </div>
            <div>
                <label style="display:block; margin-bottom:6px; font-weight:600; color:var(--text-light);">规格</label>
                <input id="manualSpec" type="text" placeholder="M / 42 / 黑色" style="width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:1rem;">
            </div>
        </div>
        
        <div style="display:flex; gap:12px; justify-content:flex-end;">
            <button class="btn btn-outline" onclick="closeManualModal()">取消</button>
            <button class="btn btn-primary" onclick="saveManualRecord()">✅ 录入历史存档</button>
        </div>
    </div>
</div>

<div class="container">
    <!-- 导航 -->
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('match-mod')">📦 快递匹配</button>
        <button class="nav-btn" onclick="switchTab('purchase-mod')">📋 采购汇总</button>
        <button class="nav-btn" onclick="switchTab('profit-mod')">💰 利润对账</button>
        <button class="nav-btn" onclick="switchTab('aftersale-mod')">⚠️ 售后信息</button>
        <button class="nav-btn" onclick="switchTab('admin-mod')">⚙️ 管理中心</button>
        <button class="nav-btn" onclick="switchTab('pending-mod')">📦 待匹配订单</button>
    </div>

    <!-- 快递扫码匹配模块（已新增手动录入按钮） -->
    <div id="match-mod" class="module-content active">
        <!-- 数据源上传 -->
        <div class="card">
            <h2>数据源上传</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="file-box">
                    <div style="font-size:2rem; margin-bottom:8px;">📄</div>
                    <div>1. 上传拼多多订单表</div>
                    <div class="status">未上传</div>
                    <input type="file" onchange="handleExcel(this, 'pdd')">
                </div>
                <div class="file-box">
                    <div style="font-size:2rem; margin-bottom:8px;">📊</div>
                    <div>2. 上传聚水潭匹配表</div>
                    <div class="status">未上传</div>
                    <input type="file" onchange="handleExcel(this, 'jst')">
                </div>
            </div>
        </div>
       
        <!-- 快递扫码匹配 -->
        <div class="card">
            <h2>快递扫码匹配</h2>
            <div style="display:flex; gap:12px; align-items:center;">
                <input type="text" id="scanIn" style="flex:1; padding:18px 20px; font-size:1.2rem; border:2px solid var(--primary); border-radius:12px; font-weight:600; background:var(--primary-light);" placeholder="🔍 扫码或输入快递单号查询..." autofocus>
                <!-- 新增手动录入按钮 -->
                <button class="btn btn-primary" onclick="showManualRecordModal()" style="padding:18px 24px; white-space:nowrap;">📝 手动录入记录</button>
            </div>
            
            <div id="matchResArea" style="margin-top:20px;"></div>
            <div id="bulkSaveArea" style="display:none; text-align:right; margin-top:20px; border-top:2px solid var(--border); padding-top:20px; justify-content: flex-end; gap: 12px; display: flex;">
                <button class="btn btn-success" onclick="copyCurrentDwOnly()">📋 仅复制得物单号</button>
                <button class="btn btn-primary" onclick="bulkSave()">✅ 批量确认并存档记录</button>
            </div>
            <div class="recent-box">
                <div style="font-weight:700; font-size:0.9rem; margin-bottom:12px; color:var(--primary); display:flex; align-items:center; gap:8px;">
                    <span>🕒</span>
                    <span>最近匹配记录 (3条)</span>
                </div>
                <div id="recentList"></div>
            </div>
        </div>
    </div>

    <!-- 其他模块保持不变（省略部分代码以节省篇幅，实际复制时请保留原代码的其余部分） -->
    <!-- ... 原代码中的 purchase-mod、profit-mod、aftersale-mod、admin-mod、pending-mod 全部保留不变 ... -->

</div>

<script>
    // ==================== 原有所有变量和函数（保持不变） ====================
    let dataStore = { pddMap: new Map(), jstMap: new Map(), pddPrice: new Map(), profitList: [], afterList: [] };
    const LOG_KEY = 'sys_logs_v53';
    let logs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
    let currentMatchItems = [];
    let clearConfirmStage = 0;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        } else {
            console.log(msg);
        }
    }

    function copyTxt(s) {
        navigator.clipboard.writeText(s).then(() => { showToast("内容已复制"); });
    }

    function switchTab(id) {
        document.querySelectorAll('.module-content').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    // ... （以下所有原有函数 handleExcel、processData、scanIn listener、copyCurrentDwOnly、bulkSave、renderLogs、exportMatchLogs、renderAfter 等全部保留不变） ...

    // ==================== 新增：手动录入功能 ====================
    function showManualRecordModal() {
        document.getElementById('manualModal').style.display = 'flex';
        // 清空输入框
        document.getElementById('manualTrack').value = '';
        document.getElementById('manualDw').value = '';
        document.getElementById('manualSpec').value = '';
    }

    function closeManualModal() {
        document.getElementById('manualModal').style.display = 'none';
    }

    function saveManualRecord() {
        const track = document.getElementById('manualTrack').value.trim();
        const dw = document.getElementById('manualDw').value.trim();
        const spec = document.getElementById('manualSpec').value.trim();

        if (!track || !dw) {
            showToast("❌ 快递单号和得物单号不能为空");
            return;
        }

        const time = new Date().toLocaleString();
        logs.unshift({ time: time, track: track, dw: dw, spec: spec || '-' });

        localStorage.setItem(LOG_KEY, JSON.stringify(logs));
        renderLogs();   // 刷新历史存档查询

        closeManualModal();
        showToast(`✅ 已成功录入历史存档（${track} → ${dw}）`);
    }

    // ==================== 原有 window.onload 等保持不变 ====================
    window.onload = renderLogs;

    // ... 其他原有待匹配订单模块代码全部保留 ...
</script>
</body>
</html>
