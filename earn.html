<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKRT计算器</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --input-bg: #F1F5F9;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 1280px; width: 100%; }
        .nav-tabs {
            display: flex; gap: 12px; margin-bottom: 24px;
            background: var(--card-bg); padding: 8px;
            border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .nav-btn {
            padding: 14px 32px; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn.active { background: var(--primary); color: white; }
        .module { display: none; }
        .module.active { display: block; }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        h2 { margin: 0 0 24px 0; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        .section-title {
            font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .form-group {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
        }
        label { font-size: 0.9rem; font-weight: 500; }
        input {
            width: 110px; padding: 8px 12px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 0.9rem; text-align: right;
            background: var(--input-bg);
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .result-group { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--bg); }
        .result-value { font-weight: 700; font-size: 1rem; }
        .profit-box, .roi-box {
            background: var(--primary); color: white; padding: 24px; border-radius: 12px; margin-top: 20px; text-align: center;
        }
        .roi-box { background: #10B981; }
        .profit-box label, .roi-box label { color: rgba(255,255,255,0.8); font-size: 0.85rem; margin-bottom: 8px; display: block; }
        .profit-box .amount, .roi-box .amount { font-size: 2.2rem; font-weight: 800; display: block; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; background: #FEE2E2; color: #EF4444; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 切换按钮 -->
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchModule(0)">📝 利润估算器</button>
        <button class="nav-btn" onclick="switchModule(1)">📊 ROI测算器</button>
        <button class="nav-btn" onclick="switchModule(2)">💹 定价核算器</button>
    </div>

    <!-- 模块1：利润核算器（左右布局） -->
    <div id="module-0" class="module active">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
            <div class="card">
                <h2>📝 输入经营参数</h2>
                <div class="section-title">订单规模</div>
                <div class="form-group"><label>总发货单量</label><input type="number" id="sales" value="100" oninput="calculate()"></div>
                <div class="form-group"><label>预计退货量 <span class="badge">必填</span></label><input type="number" id="returnQty" value="30" oninput="calculate()"></div>
                
                <div class="section-title">单品财务</div>
                <div class="form-group"><label>商品售价 (元)</label><input type="number" id="price" value="100" oninput="calculate()"></div>
                <div class="form-group"><label>拿货成本 (元)</label><input type="number" id="cost" value="30" oninput="calculate()"></div>
                <div class="form-group"><label>平台扣点率 (%)</label><input type="number" id="feeRate" value="30" oninput="calculate()"></div>

                <div class="section-title">运营杂费 (每单)</div>
                <div class="form-group"><label>单笔物流费</label><input type="number" id="logisticsFee" value="9" oninput="calculate()"></div>
                <div class="form-group"><label>单笔打包成本</label><input type="number" id="packFee" value="0" oninput="calculate()"></div>
                <div class="form-group"><label>吊牌/采购成本</label><input type="number" id="otherFee" value="1.5" oninput="calculate()"></div>
                <div class="form-group"><label>退货损耗补偿费</label><input type="number" id="returnCost" value="5.5" oninput="calculate()"></div>
            </div>

            <div class="card">
                <h2>💰 核算看板</h2>
                <div class="result-group"><label>退货率</label><span class="result-value text-danger" id="outReturnRate">0.00%</span></div>
                <div class="result-group"><label>成功交易单量</label><span class="result-value" id="outSuccessQty">0</span></div>
                <div class="result-group"><label>单单必赚</label><span class="result-value text-success" id="outSuccessProfit">￥0.00</span></div>
                <div class="result-group"><label>退货损失</label><span class="result-value text-danger" id="outReturnLoss">￥0.00</span></div>
                <div class="result-group"><label>成交总额</label><span class="result-value" id="outTotalRevenue">￥0.00</span></div>
                <div class="result-group"><label>综合利润率</label><span class="result-value" id="outProfitMargin">0.00%</span></div>
                <div class="profit-box">
                    <label>预估净利润</label>
                    <span class="amount" id="outTotalProfit">￥0.00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 模块2：ROI核算器（左右布局） -->
    <div id="module-1" class="module">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
            <div class="card">
                <h2>📝 ROI输入参数</h2>
                <div class="section-title">核心参数</div>
                <div class="form-group"><label>商品售价 (元)</label><input type="number" id="roi_price" value="100" oninput="calculate()"></div>
                <div class="form-group"><label>产品成本 (元)</label><input type="number" id="roi_cost" value="30" oninput="calculate()"></div>
                <div class="form-group"><label>平台扣点率 (%)</label><input type="number" id="roi_feeRate" value="30" oninput="calculate()"></div>
                <div class="form-group"><label>快递费 (元)</label><input type="number" id="roi_logistics" value="5" oninput="calculate()"></div>
                <div class="form-group"><label>其他成本 (元)</label><input type="number" id="roi_other" value="2" oninput="calculate()"></div>
                <div class="form-group"><label>退货款率 (%)</label><input type="number" id="roi_returnRate" value="30" oninput="calculate()"></div>
                <div class="form-group"><label>每单成交费用 (元)</label><input type="number" id="roi_perOrderFee" value="35" oninput="calculate()"></div>
            </div>

            <div class="card">
                <h2>📊 ROI计算结果</h2>
                <div class="result-group"><label>平台扣点费用</label><span class="result-value" id="outPlatformFee">0.00</span></div>
                <div class="result-group"><label>毛利润</label><span class="result-value" id="outGrossProfit">0.00</span></div>
                <div class="result-group"><label>毛利率</label><span class="result-value" id="outGrossMargin">0.00%</span></div>
                <div class="result-group"><label>总成本</label><span class="result-value" id="outTotalCost">0.00</span></div>
                <div class="result-group"><label>净利润</label><span class="result-value text-success" id="outNetProfit">0.00</span></div>
                <div class="result-group"><label>净利润率</label><span class="result-value" id="outNetMargin">0.00%</span></div>
                <div class="result-group"><label>预计ROI</label><span class="result-value text-success" id="outExpectedROI">0%</span></div>
                <div class="roi-box">
                    <label>盈亏平衡ROI</label>
                    <span class="amount" id="outBreakEvenROI">0.00倍</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 模块3：定价测算（左右布局） -->
    <div id="module-2" class="module">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
            <div class="card">
                <h2>💹 定价测算参数</h2>
                <div class="section-title">定价与费率</div>
                <div class="form-group"><label>定价 (元)</label><input type="number" id="price_price" value="109" oninput="calculate()"></div>
                <div class="form-group"><label>平台费率 (%)</label><input type="number" id="price_feeRate" value="30" oninput="calculate()"></div>
                <div class="form-group"><label>运费 (元)</label><input type="number" id="price_shipping" value="10" oninput="calculate()"></div>

                <div class="section-title">成本明细</div>
                <div class="form-group"><label>吊牌成本 (元)</label><input type="number" id="price_tagCost" value="0.15" step="0.01" oninput="calculate()"></div>
                <div class="form-group"><label>包装成本 (元)</label><input type="number" id="price_packCost" value="0.7" step="0.01" oninput="calculate()"></div>
                <div class="form-group"><label>其他成本 (元)</label><input type="number" id="price_otherCost" value="0.15" step="0.01" oninput="calculate()"></div>
                <div class="form-group"><label>可能退货成本 (元)</label><input type="number" id="price_returnCost" value="1.5" step="0.01" oninput="calculate()"></div>
                <div class="form-group"><label>产品成本 (元)</label><input type="number" id="price_productCost" value="30" oninput="calculate()"></div>

                <div class="section-title">利润设定</div>
                <div class="form-group"><label>目标利润 (元)</label><input type="number" id="price_targetProfit" value="20" oninput="calculate()"></div>
            </div>

            <div class="card">
                <h2>📈 测算结果</h2>
                <div class="section-title">利润率分析</div>
                <div class="result-group"><label>成本净利润</label><span class="result-value" id="outCostNetProfit">￥0.00</span></div>
                <div class="result-group"><label>成本净利润率</label><span class="result-value" id="outCostNetMargin">0.00%</span></div>
                <div class="result-group"><label>收入利润率</label><span class="result-value" id="outRevenueMargin">0.00%</span></div>
                
                <div class="section-title">产品成本分析</div>
                <div class="result-group"><label>产品成本线</label><span class="result-value" id="outProductCostLine">￥0.00</span></div>

                <div class="profit-box">
                    <label>预估利润</label>
                    <span class="amount" id="outEstProfit">￥0.00</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">
                    <div class="card" style="padding:16px; margin:0;">
                        <label style="font-size:0.85rem; color:var(--text-muted);">打9折利润</label>
                        <div style="font-weight:700; font-size:1.2rem;" id="outProfit90">￥0.00</div>
                    </div>
                    <div class="card" style="padding:16px; margin:0;">
                        <label style="font-size:0.85rem; color:var(--text-muted);">打8折利润</label>
                        <div style="font-weight:700; font-size:1.2rem;" id="outProfit80">￥0.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchModule(n) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.getElementById('module-' + n).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.nav-btn')[n].classList.add('active');
    }

    function calculate() {
        // ==================== 模块1：利润核算器 ====================
        const sales = parseFloat(document.getElementById('sales').value) || 0;
        const returnQty = parseFloat(document.getElementById('returnQty').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const feeRate = parseFloat(document.getElementById('feeRate').value) / 100 || 0;   // 改为百分比输入
        const logisticsFee = parseFloat(document.getElementById('logisticsFee').value) || 0;
        const packFee = parseFloat(document.getElementById('packFee').value) || 0;
        const otherFee = parseFloat(document.getElementById('otherFee').value) || 0;
        const returnCost = parseFloat(document.getElementById('returnCost').value) || 0;

        const returnRate = sales > 0 ? (returnQty / sales) : 0;
        const successQty = Math.max(0, sales - returnQty);
        const successProfit = price - cost - (price * feeRate) - packFee - otherFee - logisticsFee;
        const returnLoss = logisticsFee + packFee + otherFee + returnCost;
        const totalProfit = (successQty * successProfit) - (returnQty * returnLoss);
        const totalRevenue = successQty * price;
        const profitMargin = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;

        if (document.getElementById('outReturnRate')) {
            document.getElementById('outReturnRate').innerText = (returnRate * 100).toFixed(2) + '%';
            document.getElementById('outSuccessQty').innerText = successQty + ' 单';
            document.getElementById('outSuccessProfit').innerText = '￥' + successProfit.toFixed(2);
            document.getElementById('outReturnLoss').innerText = '￥' + returnLoss.toFixed(2);
            document.getElementById('outTotalRevenue').innerText = '￥' + totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('outTotalProfit').innerText = '￥' + totalProfit.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('outProfitMargin').innerText = profitMargin.toFixed(2) + '%';
        }

        // ==================== 模块2：ROI核算器 ====================
        const roi_price = parseFloat(document.getElementById('roi_price').value) || 0;
        const roi_cost = parseFloat(document.getElementById('roi_cost').value) || 0;
        const roi_feeRate = parseFloat(document.getElementById('roi_feeRate').value) / 100 || 0;   // 改为百分比输入
        const roi_logistics = parseFloat(document.getElementById('roi_logistics').value) || 0;
        const roi_other = parseFloat(document.getElementById('roi_other').value) || 0;
        const roi_returnRate = parseFloat(document.getElementById('roi_returnRate').value) / 100 || 0;   // 改为百分比输入
        const roi_perOrderFee = parseFloat(document.getElementById('roi_perOrderFee').value) || 0;

        const platformFee = roi_price * roi_feeRate;
        const grossProfit = roi_price - roi_cost;
        const grossMargin = roi_price > 0 ? grossProfit / roi_price : 0;
        const totalCost = roi_cost + roi_logistics + platformFee + roi_other;
        const netProfit = roi_price - totalCost;
        const netMargin = roi_price > 0 ? netProfit / roi_price : 0;
        const breakEvenROI = (netProfit > 0 && (1 - roi_returnRate) > 0) ? roi_price / (netProfit * (1 - roi_returnRate)) : 0;
        const expectedROI = roi_perOrderFee > 0 ? (netProfit / roi_perOrderFee) * 100 : 0;

        if (document.getElementById('outGrossMargin')) {
            document.getElementById('outPlatformFee').innerText = platformFee.toFixed(2);
            document.getElementById('outGrossProfit').innerText = grossProfit.toFixed(2);
            document.getElementById('outGrossMargin').innerText = (grossMargin * 100).toFixed(2) + '%';
            document.getElementById('outTotalCost').innerText = totalCost.toFixed(2);
            document.getElementById('outNetProfit').innerText = netProfit.toFixed(2);
            document.getElementById('outNetMargin').innerText = (netMargin * 100).toFixed(2) + '%';
            document.getElementById('outExpectedROI').innerText = expectedROI.toFixed(2) + '%';
            document.getElementById('outBreakEvenROI').innerText = breakEvenROI.toFixed(2) + '倍';
        }
        // ==================== 模块3：定价测算 ====================
        const price_price = parseFloat(document.getElementById('price_price').value) || 0;
        const price_feeRate = parseFloat(document.getElementById('price_feeRate').value) / 100 || 0;
        const price_shipping = parseFloat(document.getElementById('price_shipping').value) || 0;
        const price_tagCost = parseFloat(document.getElementById('price_tagCost').value) || 0;
        const price_packCost = parseFloat(document.getElementById('price_packCost').value) || 0;
        const price_otherCost = parseFloat(document.getElementById('price_otherCost').value) || 0;
        const price_returnCost = parseFloat(document.getElementById('price_returnCost').value) || 0;
        const price_productCost = parseFloat(document.getElementById('price_productCost').value) || 0;
        const price_targetProfit = parseFloat(document.getElementById('price_targetProfit').value) || 0;

        const fixedCosts = price_shipping + price_tagCost + price_packCost + price_otherCost + price_returnCost;
        const estProfit = price_price - (price_price * price_feeRate) - fixedCosts - price_productCost;
        const profit90 = price_price * 0.9 - (price_price * 0.9 * price_feeRate) - fixedCosts - price_productCost;
        const profit80 = price_price * 0.8 - (price_price * 0.8 * price_feeRate) - fixedCosts - price_productCost;
        const costNetProfit = estProfit;
        const costNetMargin = price_productCost > 0 ? (costNetProfit / price_productCost) * 100 : 0;
        const revenueProfit = estProfit;
        const revenueMargin = price_price > 0 ? (revenueProfit / price_price) * 100 : 0;
        const productCostLine = price_price - (price_price * price_feeRate) - fixedCosts - price_targetProfit;

        if (document.getElementById('outEstProfit')) {
            document.getElementById('outEstProfit').innerText = '￥' + estProfit.toFixed(2);
            document.getElementById('outProfit90').innerText = '￥' + profit90.toFixed(2);
            document.getElementById('outProfit80').innerText = '￥' + profit80.toFixed(2);
            document.getElementById('outCostNetProfit').innerText = '￥' + costNetProfit.toFixed(2);
            document.getElementById('outCostNetMargin').innerText = costNetMargin.toFixed(2) + '%';
            document.getElementById('outRevenueProfit').innerText = '￥' + revenueProfit.toFixed(2);
            document.getElementById('outRevenueMargin').innerText = revenueMargin.toFixed(2) + '%';
            document.getElementById('outProductCostLine').innerText = '￥' + productCostLine.toFixed(2);
        }
    }

    window.onload = calculate;
</script>
</body>
</html>
