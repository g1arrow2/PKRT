<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【DKDT PKRT】提示词仓库 · 赛博动感版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&amp;display=swap');
        
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00aa;
            --neon-green: #00ff88;
        }
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        body {
            font-family: 'Orbitron', system-ui, sans-serif;
            background: #0a0a0a;
            overflow: hidden;
        }
        
        /* 动态网格背景 */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            opacity: 0.15;
            background: linear-gradient(90deg, #00f0ff 1px, transparent 1px),
                        linear-gradient(#ff00aa 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 25s linear infinite;
            pointer-events: none;
        }
        
        /* 新增：本地图片背景（放在 ./image/ 文件夹） */
        .logo-bg1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.18;
            background-image: url('./image/bg.jpg');
            background-size: cover;
            background-position: center;
            animation: logoFloat1 40s ease-in-out infinite;
            pointer-events: none;
        }
        
        .logo-bg2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.12;
            background-image: url('./image/bg1.jpg');
            background-size: cover;
            background-position: center;
            animation: logoFloat2 55s ease-in-out infinite reverse;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }
        
        @keyframes logoFloat1 {
            0%, 100% { transform: rotate(0deg) translate(0, 0); }
            50% { transform: rotate(8deg) translate(30px, -40px); }
        }
        
        @keyframes logoFloat2 {
            0%, 100% { transform: rotate(0deg) translate(0, 0); }
            50% { transform: rotate(-6deg) translate(-50px, 60px); }
        }
        
        .neon-text {
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-pink);
        }
        
        .sidebar-btn {
            position: relative;
            overflow: hidden;
        }
        
        .sidebar-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 300%;
            background: linear-gradient(120deg, transparent, rgba(0, 240, 255, 0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite linear;
        }
        
        @keyframes shine {
            100% { transform: translateX(300%); }
        }
        
        .prompt-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .prompt-card:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 30px -5px rgb(0 240 255);
        }
        
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .data-table tr {
            transition: all 0.2s;
        }
        
        .data-table tr:hover {
            background: rgba(0, 240, 255, 0.1) !important;
        }
    </style>
</head>
<body class="text-white">
    <!-- 背景层 -->
    <div class="bg-layer"></div>
    <div class="logo-bg1"></div>
    <div class="logo-bg2"></div>

    <div class="flex h-screen">
        <!-- 左侧赛博侧边栏 -->
        <div class="w-72 bg-black/90 border-r border-cyan-500/30 flex flex-col">
            <!-- 顶部LOGO -->
            <div class="p-6 border-b border-cyan-500/30 flex items-center gap-3">
                <div class="w-12 h-12 flex items-center justify-center text-4xl neon-text">⚡</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-[4px] neon-text">DKDT</h1>
                    <h1 class="text-3xl font-bold tracking-[4px] text-pink-400 -mt-3">PKRT</h1>
                </div>
                <div class="ml-auto text-xs text-cyan-400 font-mono">v4.20.69</div>
            </div>

            <!-- 5大类导航 -->
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="category-list">
                <!-- JS 动态生成 -->
            </div>

            <!-- 底部控制 -->
            <div class="p-4 border-t border-cyan-500/30 space-y-3">
                <button onclick="globalSearch()" 
                        class="w-full bg-transparent border border-cyan-400 hover:border-cyan-300 text-cyan-400 hover:text-cyan-300 font-mono uppercase text-sm py-3 px-4 flex items-center justify-center gap-2 rounded-xl">
                    <span class="text-xl">🔎</span> 全库闪电搜索
                </button>
                
                <div class="flex gap-2">
                    <button onclick="exportAllToCSV()" 
                            class="flex-1 bg-gradient-to-r from-cyan-500 to-pink-500 hover:from-cyan-400 hover:to-pink-400 text-black font-bold py-3 px-4 rounded-2xl flex items-center justify-center gap-2 text-sm uppercase tracking-widest">
                        📤 导出表格
                    </button>
                    <button onclick="showImportModal()" 
                            class="flex-1 border border-white/40 hover:border-white/70 py-3 px-4 rounded-2xl flex items-center justify-center gap-2 text-sm uppercase tracking-widest">
                        📥 导入备份
                    </button>
                </div>
                
                <button onclick="clearAllData()" 
                        class="w-full text-red-400 hover:text-red-300 text-xs flex items-center justify-center gap-1 py-2">
                    <span>🗑️</span> 核爆清空本地数据
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col">
            <!-- 顶部栏 -->
            <div class="h-16 bg-black/80 border-b border-white/10 flex items-center px-8 backdrop-blur-xl">
                <div class="flex-1 flex items-center gap-4">
                    <div id="current-category-name" class="text-4xl font-bold neon-text">选择大类</div>
                    <div id="current-subtype" class="px-5 py-1 rounded-3xl bg-white/10 text-xs font-mono uppercase flex items-center gap-1">
                        <!-- JS 填充 -->
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <!-- 图片 / 视频 切换 -->
                    <div class="flex bg-white/10 rounded-3xl p-1 text-sm font-medium" id="subtype-tabs">
                        <button onclick="switchSubtype('image')" 
                                class="subtype-tab active px-7 py-2 rounded-3xl flex items-center gap-2" data-type="image">
                            🖼️ 图片提示词
                        </button>
                        <button onclick="switchSubtype('video')" 
                                class="subtype-tab px-7 py-2 rounded-3xl flex items-center gap-2" data-type="video">
                            🎬 视频提示词
                        </button>
                    </div>

                    <!-- 用户信息 -->
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <div class="text-sm font-mono text-cyan-300">立建の仓库</div>
                            <div class="text-xs text-white/40">本地永不丢失</div>
                        </div>
                        <div class="w-9 h-9 bg-gradient-to-br from-pink-400 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl shadow-inner">👾</div>
                    </div>
                </div>
            </div>

            <!-- 子类列表 + 提示词内容 -->
            <div class="flex-1 p-8 overflow-auto" id="main-content">
                <div id="empty-state" class="hidden flex flex-col items-center justify-center h-full text-center">
                    <div class="text-8xl mb-6 opacity-30">🌌</div>
                    <p class="text-2xl font-light text-white/60">这个维度还没有提示词…</p>
                    <button onclick="addNewSubcategory()" 
                            class="mt-8 px-8 py-4 bg-white text-black font-bold rounded-3xl flex items-center gap-3 hover:scale-110">
                        <span class="text-2xl">+</span> 创造第一个子类
                    </button>
                </div>
                
                <div id="subcategory-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- JS 动态生成子类卡片 -->
                </div>
            </div>

            <!-- 浮动操作按钮 -->
            <div onclick="addNewSubcategory()" 
                 class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-br from-cyan-400 to-pink-500 rounded-3xl flex items-center justify-center text-5xl shadow-2xl hover:rotate-12 cursor-pointer active:scale-95 z-50">
                +
            </div>
        </div>
    </div>

    <!-- 提示词编辑模态窗 -->
    <div id="prompt-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="modal bg-zinc-900 w-full max-w-2xl mx-4 rounded-3xl overflow-hidden border border-cyan-400/50">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                    <span id="modal-title">编辑提示词</span>
                </h2>
                
                <input id="prompt-title-input" 
                       class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 text-xl outline-none mb-4"
                       placeholder="提示词标题（可改）">
                
                <textarea id="prompt-content-input" rows="8"
                          class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-3xl px-6 py-5 text-base font-mono outline-none resize-y"></textarea>
                
                <div class="flex gap-3 mt-8">
                    <button onclick="savePrompt()" 
                            class="flex-1 py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-3xl text-lg">💾 保存到本地</button>
                    <button onclick="closeModal()" 
                            class="flex-1 py-4 border border-white/40 hover:border-white/70 rounded-3xl text-lg">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 子类重命名模态 -->
    <div id="rename-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="modal bg-zinc-900 w-full max-w-md mx-4 rounded-3xl p-8">
            <h3 class="text-xl mb-4">重命名子类</h3>
            <input id="rename-input" class="w-full bg-white/10 border border-white/30 focus:border-pink-400 rounded-2xl px-6 py-4 text-lg" placeholder="新名字">
            <div class="flex gap-3 mt-8">
                <button onclick="saveRename()" class="flex-1 py-4 bg-pink-500 text-black font-bold rounded-3xl">确认</button>
                <button onclick="closeRenameModal()" class="flex-1 py-4 border border-white/40 hover:border-white/70 rounded-3xl">取消</button>
            </div>
        </div>
    </div>

    <!-- 导入模态 -->
    <div id="import-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="modal bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl p-8">
            <h3 class="text-2xl mb-6">导入CSV表格</h3>
            <input type="file" id="csv-file" accept=".csv" class="w-full bg-white/10 border border-dashed border-white/40 rounded-3xl p-8 text-center cursor-pointer">
            <p class="text-xs text-white/40 mt-3 text-center">格式：Category,Subtype,Subcategory,PromptTitle,Content</p>
            <div class="flex gap-3 mt-8">
                <button onclick="importCSV()" class="flex-1 py-4 bg-green-500 text-black font-bold rounded-3xl">🚀 立即导入</button>
                <button onclick="closeImportModal()" class="flex-1 py-4 border border-white/40 hover:border-white/70 rounded-3xl">取消</button>
            </div>
        </div>
    </div>

    <script>
        // Tailwind 初始化
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: {
                    extend: {
                        colors: {
                            neonCyan: '#00f0ff',
                            neonPink: '#ff00aa'
                        }
                    }
                }
            }
        }
        
        // 数据结构
        let database = {
            categories: {
                "带货提示词": { image: { subcats: [] }, video: { subcats: [] } },
                "改图提示词": { image: { subcats: [] }, video: { subcats: [] } },
                "精选提示词": { image: { subcats: [] }, video: { subcats: [] } },
                "编程提示词": { image: { subcats: [] }, video: { subcats: [] } },
                "其他提示词": { image: { subcats: [] }, video: { subcats: [] } }
            }
        }
        
        let currentCategory = null
        let currentSubtype = 'image'
        let editingPrompt = null
        let renamingSubcat = null
        
        // 从 localStorage 加载
        function loadData() {
            const saved = localStorage.getItem('DKDT_PKRT_PROMPT_DB')
            if (saved) {
                database = JSON.parse(saved)
            } else {
                Object.keys(database.categories).forEach(cat => {
                    database.categories[cat].image.subcats = [{
                        id: Date.now(),
                        name: "默认示例",
                        prompts: [{
                            id: Date.now() + 1,
                            title: "示例提示词",
                            content: "一个赛博朋克风格的未来城市夜景，霓虹灯闪烁，雨夜，超高细节，8k"
                        }]
                    }]
                })
                saveData()
            }
        }
        
        function saveData() {
            localStorage.setItem('DKDT_PKRT_PROMPT_DB', JSON.stringify(database))
        }
        
        // 渲染左侧5大类
        function renderCategories() {
            const container = document.getElementById('category-list')
            container.innerHTML = ''
            
            Object.keys(database.categories).forEach((cat, index) => {
                const totalPrompts = 
                    database.categories[cat].image.subcats.reduce((a, s) => a + s.prompts.length, 0) +
                    database.categories[cat].video.subcats.reduce((a, s) => a + s.prompts.length, 0)
                
                const btn = document.createElement('div')
                btn.className = `sidebar-btn px-6 py-5 rounded-3xl flex items-center justify-between cursor-pointer group ${currentCategory === cat ? 'bg-gradient-to-r from-cyan-500/20 to-pink-500/20 border border-cyan-400' : 'hover:bg-white/10'}`
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${['🛒','🖼️','⭐','💻','🌌'][index]}</span>
                        <div>
                            <div class="font-bold text-xl">${cat}</div>
                            <div class="text-xs font-mono text-cyan-300">${totalPrompts} 条提示词</div>
                        </div>
                    </div>
                    <div class="text-4xl opacity-0 group-hover:opacity-100">→</div>
                `
                btn.onclick = () => {
                    currentCategory = cat
                    renderCategories()
                    renderMainContent()
                }
                container.appendChild(btn)
            })
        }
        
        function switchSubtype(type) {
            currentSubtype = type
            document.querySelectorAll('.subtype-tab').forEach(tab => {
                if (tab.dataset.type === type) {
                    tab.classList.add('active', 'bg-white/20', 'shadow-inner')
                } else {
                    tab.classList.remove('active', 'bg-white/20', 'shadow-inner')
                }
            })
            renderMainContent()
        }
        
        function renderMainContent() {
            if (!currentCategory) {
                document.getElementById('current-category-name').innerHTML = `<span class="text-white/40">点击左侧大类</span>`
                document.getElementById('subcategory-container').innerHTML = ''
                document.getElementById('empty-state').classList.add('hidden')
                return
            }
            
            document.getElementById('current-category-name').innerHTML = `<span class="neon-text">${currentCategory}</span>`
            document.getElementById('current-subtype').innerHTML = `
                ${currentSubtype === 'image' ? '🖼️ 图片提示词' : '🎬 视频提示词'}
                <span class="ml-2 px-3 py-px text-[10px] bg-cyan-400 text-black rounded-2xl">LIVE</span>
            `
            
            const container = document.getElementById('subcategory-container')
            const data = database.categories[currentCategory][currentSubtype]
            container.innerHTML = ''
            
            if (data.subcats.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden')
                return
            }
            document.getElementById('empty-state').classList.add('hidden')
            
            data.subcats.forEach(subcat => {
                const cardHTML = `
                <div class="prompt-card bg-white/5 border border-white/10 hover:border-cyan-400/50 rounded-3xl p-6 group">
                    <div class="flex justify-between items-start mb-4">
                        <div onclick="renameSubcategory('${currentCategory}', '${currentSubtype}', ${subcat.id})" 
                             class="font-bold text-xl cursor-pointer hover:text-cyan-400 flex-1">${subcat.name}</div>
                        <div class="flex gap-2 opacity-30 group-hover:opacity-100">
                            <button onclick="deleteSubcategory('${currentCategory}', '${currentSubtype}', ${subcat.id});event.stopImmediatePropagation()" class="text-red-400 text-xl">🗑</button>
                            <button onclick="addPromptToSubcat('${currentCategory}', '${currentSubtype}', ${subcat.id});event.stopImmediatePropagation()" class="text-cyan-400 text-2xl">+</button>
                        </div>
                    </div>
                    
                    <div class="space-y-4 max-h-96 overflow-auto pr-2 custom-scroll">
                        ${subcat.prompts.map(prompt => `
                            <div onclick="editPrompt('${currentCategory}', '${currentSubtype}', ${subcat.id}, ${prompt.id});event.stopImmediatePropagation()" 
                                 class="bg-black/40 hover:bg-black/60 rounded-2xl p-4 cursor-pointer border border-transparent hover:border-pink-400/30">
                                <div class="flex justify-between">
                                    <div class="font-medium">${prompt.title}</div>
                                    <div class="text-xs font-mono text-cyan-300">${prompt.content.length}字</div>
                                </div>
                                <div class="text-xs text-white/60 line-clamp-2 mt-2 font-mono">${prompt.content}</div>
                                <div class="flex gap-3 mt-4 text-xs">
                                    <button onclick="copyPrompt('${prompt.content}');event.stopImmediatePropagation()" class="px-4 py-1 bg-white/10 hover:bg-cyan-400 hover:text-black rounded-xl">📋 复制</button>
                                    <button onclick="deletePrompt('${currentCategory}', '${currentSubtype}', ${subcat.id}, ${prompt.id});event.stopImmediatePropagation()" class="px-4 py-1 text-red-400 hover:bg-red-400/10 rounded-xl">删除</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`
                container.innerHTML += cardHTML
            })
        }
        
        function addNewSubcategory() {
            if (!currentCategory) return alert('先选择一个大类！')
            const name = prompt('新子类名称（可随时改）？', '新子类 #' + (Date.now() % 1000))
            if (!name) return
            const subcats = database.categories[currentCategory][currentSubtype].subcats
            subcats.push({ id: Date.now(), name: name, prompts: [] })
            saveData()
            renderMainContent()
        }
        
        function renameSubcategory(cat, subtype, subcatId) {
            renamingSubcat = {cat, subtype, subcatId}
            const subcat = database.categories[cat][subtype].subcats.find(s => s.id === subcatId)
            document.getElementById('rename-input').value = subcat.name
            document.getElementById('rename-modal').classList.remove('hidden')
            document.getElementById('rename-modal').classList.add('flex')
        }
        
        function saveRename() {
            if (!renamingSubcat) return
            const newName = document.getElementById('rename-input').value.trim()
            if (!newName) return
            const subcat = database.categories[renamingSubcat.cat][renamingSubcat.subtype].subcats.find(s => s.id === renamingSubcat.subcatId)
            if (subcat) subcat.name = newName
            saveData()
            closeRenameModal()
            renderMainContent()
        }
        
        function closeRenameModal() {
            document.getElementById('rename-modal').classList.add('hidden')
            document.getElementById('rename-modal').classList.remove('flex')
            renamingSubcat = null
        }
        
        function deleteSubcategory(cat, subtype, subcatId) {
            if (!confirm('真的要删除整个子类吗？里面的提示词会一起蒸发！')) return
            const subcats = database.categories[cat][subtype].subcats
            database.categories[cat][subtype].subcats = subcats.filter(s => s.id !== subcatId)
            saveData()
            renderMainContent()
        }
        
        function addPromptToSubcat(cat, subtype, subcatId) {
            editingPrompt = {cat, subtype, subcatId, promptId: null}
            document.getElementById('modal-title').innerHTML = '🚀 新建提示词'
            document.getElementById('prompt-title-input').value = ''
            document.getElementById('prompt-content-input').value = ''
            document.getElementById('prompt-modal').classList.remove('hidden')
            document.getElementById('prompt-modal').classList.add('flex')
        }
        
        function editPrompt(cat, subtype, subcatId, promptId) {
            const subcat = database.categories[cat][subtype].subcats.find(s => s.id === subcatId)
            const prompt = subcat.prompts.find(p => p.id === promptId)
            if (!prompt) return
            editingPrompt = {cat, subtype, subcatId, promptId}
            document.getElementById('modal-title').innerHTML = '✏️ 编辑提示词'
            document.getElementById('prompt-title-input').value = prompt.title
            document.getElementById('prompt-content-input').value = prompt.content
            document.getElementById('prompt-modal').classList.remove('hidden')
            document.getElementById('prompt-modal').classList.add('flex')
        }
        
        function savePrompt() {
            if (!editingPrompt) return
            const title = document.getElementById('prompt-title-input').value.trim() || '未命名提示词'
            const content = document.getElementById('prompt-content-input').value.trim()
            const subcat = database.categories[editingPrompt.cat][editingPrompt.subtype].subcats.find(s => s.id === editingPrompt.subcatId)
            if (editingPrompt.promptId === null) {
                subcat.prompts.unshift({ id: Date.now(), title: title, content: content })
            } else {
                const prompt = subcat.prompts.find(p => p.id === editingPrompt.promptId)
                if (prompt) {
                    prompt.title = title
                    prompt.content = content
                }
            }
            saveData()
            closeModal()
            renderMainContent()
        }
        
        function closeModal() {
            document.getElementById('prompt-modal').classList.add('hidden')
            document.getElementById('prompt-modal').classList.remove('flex')
            editingPrompt = null
        }
        
        function deletePrompt(cat, subtype, subcatId, promptId) {
            if (!confirm('删除这条提示词？')) return
            const subcat = database.categories[cat][subtype].subcats.find(s => s.id === subcatId)
            subcat.prompts = subcat.prompts.filter(p => p.id !== promptId)
            saveData()
            renderMainContent()
        }
        
        function copyPrompt(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div')
                toast.textContent = '✅ 已闪电复制到剪贴板'
                toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#00f0ff;color:#000;padding:16px 28px;border-radius:9999px;font-weight:900;'
                document.body.appendChild(toast)
                setTimeout(() => toast.remove(), 2200)
            })
        }
        
        function exportAllToCSV() {
            let csv = '大类,类型,子类名称,提示词标题,内容\n'
            Object.keys(database.categories).forEach(cat => {
                ['image', 'video'].forEach(type => {
                    const label = type === 'image' ? '图片' : '视频'
                    database.categories[cat][type].subcats.forEach(sub => {
                        sub.prompts.forEach(p => {
                            csv += `"${cat}","${label}","${sub.name}","${p.title.replace(/"/g, '""')}","${p.content.replace(/"/g, '""')}"\n`
                        })
                    })
                })
            })
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
            const link = document.createElement('a')
            link.href = URL.createObjectURL(blob)
            link.download = `DKDT_PKRT_提示词全库_${new Date().toISOString().slice(0,10)}.csv`
            link.click()
            const toast = document.createElement('div')
            toast.innerHTML = '📤 表格已导出！<br><span class="text-xs">所有数据永不丢失</span>'
            toast.style.cssText = 'position:fixed;bottom:30px;right:30px;background:#ff00aa;color:#fff;padding:16px 28px;border-radius:9999px;font-weight:900;'
            document.body.appendChild(toast)
            setTimeout(() => toast.remove(), 3000)
        }
        
        function showImportModal() {
            document.getElementById('import-modal').classList.remove('hidden')
            document.getElementById('import-modal').classList.add('flex')
        }
        
        function closeImportModal() {
            document.getElementById('import-modal').classList.add('hidden')
            document.getElementById('import-modal').classList.remove('flex')
        }
        
        function importCSV() {
            const fileInput = document.getElementById('csv-file')
            const file = fileInput.files[0]
            if (!file) return alert('先选个CSV文件啊兄弟')
            const reader = new FileReader()
            reader.onload = function(e) {
                const text = e.target.result
                const rows = text.split('\n').slice(1)
                rows.forEach(row => {
                    if (!row.trim()) return
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                    if (cols.length < 5) return
                    const cat = cols[0].replace(/"/g, '')
                    const typeLabel = cols[1].replace(/"/g, '')
                    const subName = cols[2].replace(/"/g, '')
                    const title = cols[3].replace(/"/g, '')
                    const content = cols[4].replace(/"/g, '')
                    const subtype = typeLabel.includes('图片') ? 'image' : 'video'
                    if (!database.categories[cat]) return
                    let subcat = database.categories[cat][subtype].subcats.find(s => s.name === subName)
                    if (!subcat) {
                        subcat = { id: Date.now(), name: subName, prompts: [] }
                        database.categories[cat][subtype].subcats.push(subcat)
                    }
                    subcat.prompts.push({ id: Date.now() + Math.random(), title: title || '导入提示词', content: content })
                })
                saveData()
                closeImportModal()
                renderCategories()
                renderMainContent()
                alert('🎉 全部导入成功！本地数据已更新')
            }
            reader.readAsText(file)
        }
        
        function globalSearch() {
            const keyword = prompt('🔦 闪电搜索全库（支持模糊）', '').trim()
            if (!keyword) return
            let resultsHTML = '<div class="col-span-full text-2xl mb-6">搜索结果</div>'
            let found = false
            Object.keys(database.categories).forEach(cat => {
                ['image', 'video'].forEach(type => {
                    database.categories[cat][type].subcats.forEach(sub => {
                        sub.prompts.forEach(p => {
                            if (p.title.includes(keyword) || p.content.includes(keyword)) {
                                found = true
                                resultsHTML += `
                                <div onclick="currentCategory='${cat}';currentSubtype='${type}';renderCategories();renderMainContent()" class="col-span-1 bg-gradient-to-br from-cyan-900/30 to-pink-900/30 border border-cyan-400/30 rounded-3xl p-5 cursor-pointer">
                                    <div class="text-xs text-white/50">${cat} · ${type === 'image' ? '🖼️' : '🎬'}</div>
                                    <div class="font-bold">${p.title}</div>
                                    <div class="text-xs line-clamp-3 mt-2 text-white/70">${p.content}</div>
                                </div>`
                            }
                        })
                    })
                })
            })
            if (!found) resultsHTML = `<div class="col-span-full text-center py-20 text-3xl">没找到“${keyword}”… 再试试？</div>`
            const container = document.getElementById('subcategory-container')
            container.innerHTML = resultsHTML
            document.getElementById('current-category-name').innerHTML = `🔎 搜索 “${keyword}”`
        }
        
        // 【修改点1】核爆清空改为二次确认
        function clearAllData() {
            if (confirm('⚠️ 核弹警告！真的要清空全部提示词吗？\n\n（本地数据将彻底归零）')) {
                if (confirm('第二次确认：这是最后一次机会！所有数据将永久删除！\n\n确定要核爆清空吗？')) {
                    localStorage.removeItem('DKDT_PKRT_PROMPT_DB')
                    location.reload()
                }
            }
        }
        
        function launch() {
            initTailwind()
            loadData()
            renderCategories()
            currentCategory = Object.keys(database.categories)[0]
            renderCategories()
            renderMainContent()
            console.log('%c🚀 DKDT PKRT 提示词仓库 已就绪 - 本地H5 动感版', 'background:#ff00aa;color:#000;padding:2px 6px;border-radius:4px;font-size:13px')
            console.log('所有操作自动保存 • 永不丢失 • 赛博朋克交互已拉满')
        }
        
        window.onload = launch
    </script>
</body>
