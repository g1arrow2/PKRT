<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日快递发货记录器 - 稳定修正版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #EEF2FF;
            --bg: #F1F5F9;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --success: #10B981;
            --success-light: #D1FAE5;
            --danger: #EF4444;
            --danger-light: #FEE2E2;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }
        
        .container { max-width: 1140px; margin: 0 auto; position: relative; }
        
        .nav-tabs {
            display: flex; gap: 6px; margin-bottom: 24px;
            background: var(--card); padding: 8px; border-radius: 16px;
            box-shadow: var(--shadow); flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 12px 20px; border: none; background: transparent;
            border-radius: 10px; cursor: pointer; font-weight: 600;
            font-size: 0.9rem; color: var(--text-light);
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover { background: var(--primary-light); color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        
        .module-content { display: none; animation: fadeIn 0.3s ease; }
        .module-content.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card {
            background: var(--card); border-radius: 16px; padding: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            margin-bottom: 20px; transition: all 0.3s ease;
        }
        
        .card:hover { box-shadow: var(--shadow-lg); }
        
        h2 {
            margin: 0 0 20px 0; font-size: 1.25rem; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 16px; border-bottom: 2px solid var(--primary-light);
        }
        
        #scanIn {
            width: 100%; padding: 18px 20px; font-size: 1.2rem;
            border: 2px solid var(--primary); border-radius: 12px;
            font-weight: 600; background: var(--primary-light);
        }
        
        .list-area {
            max-height: 460px; overflow-y: auto; margin-top: 16px;
        }
        
        table {
            width: 100%; border-collapse: collapse; font-size: 0.95rem;
        }
        
        th, td {
            padding: 14px 16px; border: 1px solid var(--border); text-align: left;
        }
        
        th { background: var(--bg); font-weight: 600; color: var(--text-light); }
        tr:hover td { background: var(--primary-light); }
        tr.duplicate { background-color: var(--warning-light) !important; }
        .ignored { color: #64748B !important; text-decoration: line-through; }
        .dup-text { color: #f59e0b; font-weight: 700; }
        
        .express-tag {
            display: inline-block; padding: 3px 6px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold; background: #F1F5F9; color: #475569;
        }

        /* 左侧独立背景悬浮统计看板 */
        .fixed-left-sidebar {
            position: fixed;
            top: 25px;
            width: 240px;
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            z-index: 999;
            display: none; 
        }
        .sidebar-title {
            font-weight: 700; font-size: 0.95rem; color: var(--text);
            margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--primary-light);
        }
        .sidebar-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; background: var(--bg); border-radius: 8px;
            margin-bottom: 6px; font-weight: 600; font-size: 0.85rem;
        }
        .sidebar-label {
            display: inline-block; padding: 3px 6px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold; background: #E2E8F0; color: #475569;
        }

        @media (min-width: 1660px) {
            .fixed-left-sidebar { display: block; left: calc(50% - 815px); } 
        }
        @media (min-width: 1400px) and (max-width: 1659px) {
            .fixed-left-sidebar { display: block; left: 10px; }
        }

        .summary-box {
            background: var(--primary-light); border-radius: 12px;
            padding: 20px; margin-top: 24px; border: 2px solid var(--primary);
            font-family: 'SF Mono', Monaco, monospace; font-size: 0.95rem;
            line-height: 1.5; white-space: pre-wrap; word-break: break-all;
        }
        
        .btn {
            padding: 10px 20px; border-radius: 10px; border: none;
            cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #DC2626; }
        
        .stat-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 20px;
        }
        
        .stat-item {
            background: var(--card); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center;
        }
        
        .stat-value {
            font-size: 2rem; font-weight: 700; color: var(--primary);
        }
        
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 19999; opacity: 0; transition: all 0.3s;
            pointer-events: none; text-align: center; font-weight: 500;
        }
        .toast.show { opacity: 1; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.75);
            z-index: 10000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card); max-width: 920px; width: 92%;
            border-radius: 16px; box-shadow: var(--shadow-lg);
            max-height: 88vh; display: flex; flex-direction: column;
        }
        .modal-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body {
            padding: 20px; overflow: auto; flex: 1;
            background: #f8fafc;
        }
        .modal-footer {
            padding: 16px 24px; border-top: 1px solid var(--border);
            text-align: right;
        }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .nav-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>

<div class="fixed-left-sidebar" id="leftExpressSidebar">
    <div class="sidebar-title">📊 当日快递公司汇总</div>
    <div class="sidebar-row"><span class="sidebar-label" style="background:#E0E7FF; color:#4338CA;">圆通速递 (YT)</span><span id="stat-yt" style="color:var(--primary);">0 单</span></div>
    <div class="sidebar-row"><span class="sidebar-label" style="background:#E2E8F0; color:#1E293B;">顺丰速运 (SF)</span><span id="stat-sf" style="color:var(--primary);">0 单</span></div>
    <div class="sidebar-row"><span class="sidebar-label" style="background:#FEE2E2; color:#991B1B;">京东快递 (JD)</span><span id="stat-jd" style="color:var(--primary);">0 单</span></div>
    <div class="sidebar-row"><span class="sidebar-label" style="background:#FEF3C7; color:#92400E;">极兔速递 (JT)</span><span id="stat-jt" style="color:var(--primary);">0 单</span></div>
    <div class="sidebar-row"><span class="sidebar-label" style="background:#D1FAE5; color:#065F46;">申通快递 (77)</span><span id="stat-st" style="color:var(--primary);">0 单</span></div>
    <div class="sidebar-row"><span class="sidebar-label" style="background:#CFFAFE; color:#0369A1;">中通快递 (78)</span><span id="stat-zt" style="color:var(--primary);">0 单</span></div>
    <div class="sidebar-row" style="background:#F8FAFC;"><span class="sidebar-label">其他快递</span><span id="stat-other" style="color:var(--text-light);">0 单</span></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">历史发货明细</h3>
            <button class="btn btn-danger" onclick="closeModal()">关闭</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button class="btn btn-success" onclick="copyModalContent()">📋 复制有效单号汇总</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('record-mod')">📦 每日发货记录</button>
        <button class="nav-btn" onclick="switchTab('summary-mod')">📋 汇总导出</button>
        <button class="nav-btn" onclick="switchTab('history-mod')">🕒 历史记录</button>
    </div>

    <div id="record-mod" class="module-content active">
        <div class="card">
            <h2>🚚 快递单号录入（支持任意日期）</h2>
            
            <div style="margin-bottom:24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span style="font-weight:600; white-space:nowrap;">选择日期：</span>
                <input type="date" id="recordDate" onchange="loadSelectedDate()" 
                       style="padding:10px 14px; border:2px solid var(--border); border-radius:8px; font-weight:600;">
                <span id="dateLabel" style="color:var(--text-light); font-size:0.95rem;"></span>
            </div>
            
            <input type="text" id="scanIn" placeholder="🔍 扫码或输入快递单号后按回车" autofocus>
            
            <div class="stat-grid" style="margin-top:24px;">
                <div class="stat-item">
                    <div id="countDisplay" class="stat-value">0</div>
                    <div style="color:var(--text-light);font-weight:600;">有效记录</div>
                </div>
                <div class="stat-item">
                    <div id="selectedDateDisplay" class="stat-value" style="font-size:1.1rem;color:var(--text-light);">2026-03-27</div>
                    <div style="color:var(--text-light);font-weight:600;">当前查看日期</div>
                </div>
            </div>

            <div class="list-area">
                <table>
                    <thead>
                        <tr>
                            <th style="width:70px;">序号</th>
                            <th>快递单号</th>
                            <th>录入时间</th>
                            <th style="width:140px;">状态</th>
                            <th style="width:90px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordList"></tbody>
                </table>
            </div>

            <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
                <button class="btn btn-danger" onclick="clearCurrentDate()">🗑️ 清空当前日期记录</button>
                <button class="btn btn-success" onclick="copySummaryFromRecord()">📋 复制汇总文本</button>
            </div>
        </div>
    </div>

    <div id="summary-mod" class="module-content">
        <div class="card">
            <h2>📋 当前日期发货汇总（已自动每19个换行）</h2>
            <div id="summaryText" class="summary-box" style="min-height:320px;"></div>
            
            <div style="margin-top:16px; display:flex; gap:12px;">
                <button class="btn btn-primary" onclick="copySummary()">📋 一键复制汇总</button>
                <button class="btn btn-success" onclick="exportCurrentExcel()">📥 导出Excel</button>
                <button class="btn btn-danger" onclick="clearCurrentDate()">🗑️ 清空当前日期</button>
            </div>
        </div>
    </div>

    <div id="history-mod" class="module-content">
        <div class="card">
            <h2>🕒 历史范围统计数据汇总</h2>
            <div class="stat-grid">
                <div class="stat-item">
                    <div id="historyRangeTotal" class="stat-value" style="color:var(--primary);">0</div>
                    <div style="color:var(--text-light);font-weight:600;">当前范围·扫描总数</div>
                </div>
                <div class="stat-item">
                    <div id="historyRangeValid" class="stat-value" style="color:var(--success);">0</div>
                    <div style="color:var(--text-light);font-weight:600;">当前范围·有效总数</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🔍 跨时间发货记录查询与数据导出</h2>
            <div style="margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                <span style="font-weight:600; font-size:0.9rem;">选择范围：</span>
                <input type="date" id="historyStartDate" style="padding:10px 14px; border:2px solid var(--border); border-radius:8px;">
                <span style="color:var(--text-light);">至</span>
                <input type="date" id="historyEndDate" style="padding:10px 14px; border:2px solid var(--border); border-radius:8px;">
                <input type="text" id="historySearch" placeholder="🔍 输入特定单号精确查找" style="flex:1; min-width:200px; padding:10px 14px; border:2px solid var(--border); border-radius:8px;">
                <button class="btn btn-primary" onclick="loadHistory()">📊 点击查询</button>
                <button class="btn btn-success" onclick="exportRangeExcel()">📥 导出当前段记录明细</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>核算日期</th>
                        <th>记录明细统计 (全部 / 有效)</th>
                        <th>日常操作</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'daily_express_v1';
    let allHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let currentDateKey = '';
    let currentList = [];
    let pendingDeleteIndex = -1;

    function getDateKey(dateStr) {
        return dateStr || new Date().toISOString().slice(0,10);
    }

    function identifyExpress(num) {
        const str = String(num).trim().toUpperCase();
        if (str.startsWith('SF') || /^\d{12}$/.test(str) || /^\d{15}$/.test(str)) return 'sf';
        if (str.startsWith('YT') || /^1[35789]\d{11}$/.test(str)) return 'yt';
        if (str.startsWith('JT') || /^5[0123456]\d{11}$/.test(str)) return 'jt';
        if (str.startsWith('JD')) return 'jd';
        if (str.startsWith('77')) return 'st';
        if (str.startsWith('78')) return 'zt';
        return 'other';
    }

    function loadSelectedDate() {
        currentDateKey = document.getElementById('recordDate').value;
        document.getElementById('selectedDateDisplay').textContent = currentDateKey;
        document.getElementById('dateLabel').textContent = currentDateKey === getDateKey() ? '（今日）' : '';
        
        currentList = (allHistory[currentDateKey] || []).map(item => ({
            number: item.number,
            time: item.time,
            status: item.status || 'normal'
        }));
        
        renderRecordList();
        renderSummary();
        updateCount();
        calculateCompanyStats();
    }

    function saveCurrentDate() {
        allHistory[currentDateKey] = currentList;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allHistory));
    }

    function getNormalList() {
        return currentList.filter(it => it.status === 'normal');
    }

    function updateCount() {
        document.getElementById('countDisplay').textContent = getNormalList().length;
    }

    function calculateCompanyStats() {
        const stats = { yt: 0, jd: 0, jt: 0, sf: 0, st: 0, zt: 0, other: 0 };
        getNormalList().forEach(item => {
            const code = identifyExpress(item.number);
            stats[code]++;
        });
        
        // 安全保护，防止元素未渲染完成时报错中断
        if(document.getElementById('stat-yt')) document.getElementById('stat-yt').textContent = stats.yt + ' 单';
        if(document.getElementById('stat-sf')) document.getElementById('stat-sf').textContent = stats.sf + ' 单';
        if(document.getElementById('stat-jd')) document.getElementById('stat-jd').textContent = stats.jd + ' 单';
        if(document.getElementById('stat-jt')) document.getElementById('stat-jt').textContent = stats.jt + ' 单';
        if(document.getElementById('stat-st')) document.getElementById('stat-st').textContent = stats.st + ' 单';
        if(document.getElementById('stat-zt')) document.getElementById('stat-zt').textContent = stats.zt + ' 单';
        if(document.getElementById('stat-other')) document.getElementById('stat-other').textContent = stats.other + ' 单';
    }

    function renderRecordList() {
        const tbody = document.getElementById('recordList');
        tbody.innerHTML = '';

        const numCount = {};
        currentList.forEach(it => numCount[it.number] = (numCount[it.number] || 0) + 1);
        const dups = new Set(Object.keys(numCount).filter(k => numCount[k] > 1));

        currentList.forEach((item, i) => {
            const isDup = dups.has(item.number);
            const isIgnored = item.status !== 'normal';
            const isPending = pendingDeleteIndex === i;
            const btnStyle = isPending ? 'background:#f59e0b !important;color:white;' : '';

            const rowHTML = `
                <tr class="${isDup ? 'duplicate' : ''}">
                    <td>${i+1}</td>
                    <td class="${isIgnored ? 'ignored' : ''} ${isDup ? 'dup-text' : ''}" style="font-family:monospace;font-weight:600;">
                        ${item.number}
                    </td>
                    <td>${item.time}</td>
                    <td>
                        <select onchange="changeStatus(${i}, this.value)" style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);">
                            <option value="normal" ${item.status==='normal'?'selected':''}>正常</option>
                            <option value="canceled" ${item.status==='canceled'?'selected':''}>已取消</option>
                            <option value="intercepted" ${item.status==='intercepted'?'selected':''}>已拦截</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn btn-danger" style="padding:6px 12px;font-size:0.85rem;${btnStyle}" onclick="handleDeleteClick(${i})">删除</button>
                    </td>
                </tr>`;
            tbody.innerHTML += rowHTML;
        });
    }

    function renderSummary() {
        const box = document.getElementById('summaryText');
        if(!box) return;
        const normal = getNormalList();
        if (normal.length === 0) {
            box.textContent = '暂无有效记录';
            return;
        }
        const numbers = normal.map(item => item.number);
        const chunks = [];
        for (let i = 0; i < numbers.length; i += 19) {
            chunks.push(numbers.slice(i, i + 19).join(','));
        }
        box.textContent = chunks.join(',\n');
    }

    function addExpress(number) {
        if (!number.trim()) return;
        const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
        currentList.unshift({ number: number.trim(), time, status: 'normal' });
        saveCurrentDate();
        renderRecordList();
        renderSummary();
        updateCount();
        calculateCompanyStats();
    }

    function changeStatus(index, newStatus) {
        currentList[index].status = newStatus;
        saveCurrentDate();
        renderRecordList();
        renderSummary();
        updateCount();
        calculateCompanyStats();
    }

    function handleDeleteClick(index) {
        if (pendingDeleteIndex === index) {
            currentList.splice(index, 1);
            saveCurrentDate();
            renderRecordList();
            renderSummary();
            updateCount();
            calculateCompanyStats();
            pendingDeleteIndex = -1;
            showToast('✅ 已删除该记录');
        } else {
            pendingDeleteIndex = index;
            renderRecordList();
            showToast('再次点击“删除”按钮确认删除');
            setTimeout(() => {
                if (pendingDeleteIndex === index) {
                    pendingDeleteIndex = -1;
                    renderRecordList();
                }
            }, 8000);
        }
    }

    function clearCurrentDate() {
        if (!confirm('⚠️ 第一次确认：您确定要清空当前日期所有记录吗？')) return;
        if (!confirm('⚠️ 第二次确认：此操作不可恢复！真的要全部清空吗？')) return;

        delete allHistory[currentDateKey];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allHistory));
        currentList = [];
        
        renderRecordList();
        renderSummary();
        updateCount();
        calculateCompanyStats();
        showToast('✅ 当前日期记录已全部清空');
    }

    function copySummary() {
        const text = document.getElementById('summaryText').textContent;
        if (text === '暂无有效记录') return;
        navigator.clipboard.writeText(text).then(() => showToast('✅ 汇总文本已复制！'));
    }

    function copySummaryFromRecord() {
        renderSummary();
        copySummary();
    }

    function exportCurrentExcel() {
        const normal = getNormalList();
        if (normal.length === 0) return showToast('没有有效数据可导出');
        const data = [['序号', '快递单号', '录入时间', '状态']];
        normal.forEach((item, i) => data.push([i+1, item.number, item.time, '正常']));
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '发货记录');
        XLSX.writeFile(wb, `发货记录_${currentDateKey}.xlsx`);
        showToast('✅ Excel 已导出');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function switchTab(id) {
        document.querySelectorAll('.module-content').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if(btn.getAttribute('onclick') === `switchTab('${id}')`) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
        
        const sidebar = document.getElementById('leftExpressSidebar');
        if(id === 'record-mod') {
            if(sidebar) sidebar.style.display = '';
            calculateCompanyStats();
        } else {
            if(sidebar) sidebar.style.display = 'none'; // 非记录Tab下静默隐藏挂件
        }
        
        if (id === 'summary-mod') renderSummary();
        if (id === 'history-mod') loadHistory();
    }

    // ====================== 历史数据清洗过滤层 ======================
    function getFilteredHistoryData() {
        const startVal = document.getElementById('historyStartDate') ? document.getElementById('historyStartDate').value : '';
        const endVal = document.getElementById('historyEndDate') ? document.getElementById('historyEndDate').value : '';
        const searchTerm = document.getElementById('historySearch') ? document.getElementById('historySearch').value.trim().toLowerCase() : '';

        let filteredDates = Object.keys(allHistory).sort().reverse();

        if (startVal) filteredDates = filteredDates.filter(date => date >= startVal);
        if (endVal) filteredDates = filteredDates.filter(date => date <= endVal);

        let totalRecordsCount = 0;
        let validRecordsCount = 0;
        let finalMap = {};

        filteredDates.forEach(date => {
            const records = allHistory[date] || [];
            let matchedRecords = records;
            if (searchTerm) {
                matchedRecords = records.filter(r => (r.number || '').toLowerCase().includes(searchTerm));
            }

            if (matchedRecords.length > 0 || !searchTerm) {
                finalMap[date] = matchedRecords;
                totalRecordsCount += matchedRecords.length;
                validRecordsCount += matchedRecords.filter(r => (r.status || 'normal') === 'normal').length;
            }
        });

        return { finalMap, totalRecordsCount, validRecordsCount };
    }

    function renderHistory() {
        const tbody = document.getElementById('historyBody');
        if(!tbody) return; // 安全容错保护
        
        tbody.innerHTML = '';
        const { finalMap, totalRecordsCount, validRecordsCount } = getFilteredHistoryData();

        // 只有在元素存在的情况下进行数值更新，防止阻塞
        if(document.getElementById('historyRangeTotal')) document.getElementById('historyRangeTotal').textContent = totalRecordsCount;
        if(document.getElementById('historyRangeValid')) document.getElementById('historyRangeValid').textContent = validRecordsCount;

        Object.keys(finalMap).forEach(date => {
            const records = finalMap[date];
            const total = records.length;
            const valid = records.filter(r => (r.status || 'normal') === 'normal').length;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${date}</td>
                <td style="font-weight:600;color:var(--primary);">
                    全部: <strong>${total}</strong> / 有效: <strong>${valid}</strong>
                </td>
                <td>
                    <button class="btn btn-primary" style="padding:6px 12px;font-size:0.8rem;" onclick="viewHistory('${date}')">查看明细</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function loadHistory() { 
        renderHistory(); 
    }

    function exportRangeExcel() {
        const { finalMap } = getFilteredHistoryData();
        const dates = Object.keys(finalMap);
        if (dates.length === 0) return showToast('当前所选范围内无可导出的有效记录');

        const data = [['发货日期', '序号', '快递单号', '录入时间', '状态说明']];
        let numId = 1;

        dates.sort().forEach(date => {
            finalMap[date].forEach(item => {
                const statusText = item.status === 'normal' ? '正常' : (item.status === 'canceled' ? '已取消' : '已拦截');
                data.push([date, numId++, item.number, item.time, statusText]);
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '历史范围发货明细');
        
        const startVal = document.getElementById('historyStartDate').value || '起点';
        const endVal = document.getElementById('historyEndDate').value || '终点';
        XLSX.writeFile(wb, `发货历史对账单_${startVal}_到_${endVal}.xlsx`);
        showToast('✅ 范围历史对账表已导出');
    }

    function viewHistory(date) {
        const list = allHistory[date] || [];
        if (list.length === 0) return showToast('无数据');

        let html = `<table style="width:100%;border-collapse:collapse;"><thead><tr>
            <th style="background:#f1f5f9;padding:10px;">快递单号</th>
            <th style="background:#f1f5f9;padding:10px;">录入时间</th>
            <th style="background:#f1f5f9;padding:10px;">状态</th>
        </tr></thead><tbody>`;

        list.forEach(item => {
            const statusText = item.status === 'normal' ? '正常' : (item.status === 'canceled' ? '已取消' : '已拦截');
            const style = item.status !== 'normal' ? 'color:#64748b;text-decoration:line-through;' : '';
            html += `<tr style="${style}">
                <td style="padding:10px;font-family:monospace;">${item.number}</td>
                <td style="padding:10px;">${item.time}</td>
                <td style="padding:10px;">${statusText}</td>
            </tr>`;
        });
        html += '</tbody></table>';

        document.getElementById('modalTitle').innerHTML = `${date} 发货明细`;
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function copyModalContent() {
        const rows = document.querySelectorAll('#modalBody tbody tr');
        let numbers = [];
        rows.forEach(row => {
            const cells = row.cells;
            if (cells[2].textContent === '正常') { numbers.push(cells[0].textContent); }
        });
        const text = numbers.join(',');
        navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制有效单号汇总'));
    }

    document.getElementById('scanIn').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const val = this.value.trim();
            if (val) {
                addExpress(val);
                this.value = '';
                this.focus();
            }
        }
    });

    window.onload = function() {
        const today = getDateKey();
        document.getElementById('recordDate').value = today;
        currentDateKey = today;
        document.getElementById('selectedDateDisplay').textContent = today;
        loadSelectedDate();
        renderHistory(); // 确保开机初始化正常运行
        setTimeout(() => document.getElementById('scanIn').focus(), 300);
    };
</script>
</body>
